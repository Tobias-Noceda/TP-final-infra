---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: sock-shop
data:
  redis.conf: |
    # Enable RDS snapshots (Snapshooting)
    save 900 1
    save 300 10
    save 60 10000
    # Enable AOF (Append Only File)
    appendonly yes
    appendfsync everysec
    # Path for persistence
    dir /data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-db
  labels:
    name: session-db
  namespace: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      name: session-db
  template:
    metadata:
      labels:
        name: session-db
      annotations:
        prometheus.io.scrape: "false"
    spec:
      containers:
      - name: session-db
        image: redis:alpine
        command:
          - "redis-server"
          - "/usr/local/etc/redis/redis.conf"
        ports:
        - name: redis
          containerPort: 6379
        resources:
          limits:
            cpu: 200m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
        securityContext:
          capabilities:
            drop:
              - all
            add:
              - CHOWN
              - SETGID
              - SETUID
          readOnlyRootFilesystem: false
        volumeMounts:
        - name: session-db-data
          mountPath: /data
        - name: redis-config
          mountPath: /usr/local/etc/redis
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - redis-cli ping > /dev/null 2>&1
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - redis-cli ping > /dev/null 2>&1
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 10
      volumes:
      - name: session-db-data
        persistentVolumeClaim:
          claimName: session-db-pvc
      - name: redis-config
        configMap:
          name: redis-config
      nodeSelector:
        beta.kubernetes.io/os: linux
---
apiVersion: v1
kind: Service
metadata:
  name: session-db
  labels:
    name: session-db
  namespace: sock-shop
spec:
  clusterIP: None
  ports:
    # the port that this service should serve on
  - port: 6379
    targetPort: 6379
  selector:
    name: session-db
