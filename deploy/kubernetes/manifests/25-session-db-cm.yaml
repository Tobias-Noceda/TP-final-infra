---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: sock-shop
data:
  redis.conf: |
    # Enable RDS snapshots (Snapshooting)
    save 900 1
    save 300 10
    save 60 10000
    # Enable AOF (Append Only File)
    appendonly yes
    appendfsync everysec
    # Path for persistence
    dir /data
